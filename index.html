      function updateHeaderFade() {
        if (window.innerWidth <= 900) {
          nameLink.style.opacity = "";
          aboutLink.style.opacity = "";
          topRightLinks.style.opacity = "";
          nameLink.style.pointerEvents = "";
          aboutLink.style.pointerEvents = "";
          topRightLinks.style.pointerEvents = "";
          topRightLinks.classList.remove("is-faded");
          toTopBtn.classList.remove("is-visible");
          return;
        }

        const progress = Math.min(window.scrollY / fadeDistance, 1);
        const opacity = 1 - progress;
        const faded = opacity <= 0.05;
        const pointerEvents = faded ? "none" : "";

        nameLink.style.opacity = opacity;
        aboutLink.style.opacity = opacity;
        topRightLinks.style.opacity = opacity;
        nameLink.style.pointerEvents = pointerEvents;
        aboutLink.style.pointerEvents = pointerEvents;
        topRightLinks.style.pointerEvents = pointerEvents;
        topRightLinks.classList.toggle("is-faded", faded);
        toTopBtn.classList.toggle("is-visible", window.scrollY >= toTopShowDistance);

      const gallery = document.getElementById("art-gallery");

      function toDisplayPath(src, useHighRes = false) {
        return src.replace("art/", useHighRes ? "art/highres/" : "art/lowres/");
      }

      function makeImage(src, alt, className = "art-image", useHighRes = false) {
        const img = document.createElement("img");
        img.className = className;
        img.src = encodeURI(toDisplayPath(src, useHighRes));
        img.alt = alt;
        img.loading = "lazy";
        img.decoding = "async";
        return img;
      }

      function makeCaption(text) {
        const caption = document.createElement("p");
        caption.className = "art-caption";
        caption.innerHTML = text || "Sample text.";
        return caption;
      }

      function makeStage(mediaEl, captionText) {
        const stage = document.createElement("div");
        stage.className = "art-stage";
        stage.appendChild(mediaEl);

        const panel = document.createElement("div");
        panel.className = "art-caption-panel";
        const caption = makeCaption(captionText);
        panel.appendChild(caption);
        stage.appendChild(panel);

        return { stage, caption, panel };
      }

      function layoutCaptionPanel(stage) {
        if (!stage || window.innerWidth <= 900) return;

        const panel = stage.querySelector(".art-caption-panel");
        const media = stage.querySelector(":scope > .carousel-frame, :scope > .art-image");
        if (!panel || !media) return;

        const stageRect = stage.getBoundingClientRect();
        const mediaRect = media.getBoundingClientRect();
        const width = 292;

        // Left edge comes from --art-media-width so every caption shares the same x.
        panel.style.left = "";
        panel.style.top = `${mediaRect.top - stageRect.top}px`;
        panel.style.height = `${mediaRect.height}px`;
        panel.style.setProperty("--caption-panel-width", `${width}px`);
      }

      function layoutActiveCaptionPanel() {
        const selected = document.querySelector(".art-image.is-selected");
        const stage = selected?.closest(".art-stage");
        if (stage) layoutCaptionPanel(stage);
      }

      function hasOpenSelection() {
        return Boolean(
          document.querySelector(".art-card.is-expanded, .art-image.is-selected")
        );
      }

      const SCROLL_OFFSET = 55;
      let scrollGeneration = 0;

      function scrollToArtwork(element, { offset = SCROLL_OFFSET, onComplete } = {}) {
        scrollGeneration += 1;
        const generation = scrollGeneration;

        const finish = () => {
          if (generation !== scrollGeneration) return;
          onComplete?.();
        };

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (generation !== scrollGeneration) return;

            const nextY = Math.max(
              0,
              window.scrollY + element.getBoundingClientRect().top - offset
            );

            if (Math.abs(nextY - window.scrollY) < 1) {
              finish();
              return;
            }

            window.scrollTo({ top: window.scrollY, behavior: "auto" });

            requestAnimationFrame(() => {
              if (generation !== scrollGeneration) return;

              window.scrollTo({ top: nextY, behavior: "smooth" });

              let done = false;
              const complete = () => {
                if (done || generation !== scrollGeneration) return;
                done = true;
                finish();
              };

              window.addEventListener("scrollend", complete, { once: true });
              setTimeout(complete, 500);
            });
          });
        });
      }

      function activateSelection({ keepCard, keepCover, keepChild, keepChildWrap, apply, scrollTarget }) {
        const switching = hasOpenSelection();

        if (switching) {
          clearSelections({ keepCard, keepCover, keepChild, keepChildWrap });
          apply();
        } else {
          apply();
          clearSelections({ keepCard, keepCover, keepChild, keepChildWrap });
        }

        const stage = keepCover?.closest(".art-stage") || keepCard?.querySelector(".art-stage");
        if (stage) {
          // Measure before the panel expands so width can animate from 0.
          layoutCaptionPanel(stage);
          requestAnimationFrame(() => layoutCaptionPanel(stage));
        }

        if (scrollTarget) {
          scrollToArtwork(scrollTarget);
        }
      }

      function clearSelections(options = {}) {
        const { keepCard = null, keepCover = null, keepChild = null, keepChildWrap = null } = options;

        document.querySelectorAll(".art-cover").forEach((cover) => {
          if (cover !== keepCover && cover._resetCarousel && cover.classList.contains("is-selected")) {
            cover._resetCarousel();
          }
        });

        document.querySelectorAll(".art-image.is-selected").forEach((img) => {
          if (img !== keepCover && img !== keepChild) {
            img.classList.remove("is-selected");
          }
        });

        document.querySelectorAll(".art-cover.is-open").forEach((cover) => {
          if (cover !== keepCover) {
            cover.classList.remove("is-open");
          }
        });

        document.querySelectorAll(".art-card.is-title-visible").forEach((cardEl) => {
          if (cardEl !== keepCard) {
            cardEl.classList.remove("is-title-visible");
          }
        });

        document.querySelectorAll(".project-image-item.is-title-visible").forEach((wrap) => {
          if (wrap !== keepChildWrap) {
            wrap.classList.remove("is-title-visible");
          }
        });

        document.querySelectorAll(".art-card.is-expanded").forEach((cardEl) => {
          if (cardEl !== keepCard) {
            cardEl.classList.remove("is-expanded");
          }
        });
      }

      function closeActiveArtwork() {
        const selected = document.querySelector(".art-image.is-selected");
        if (!selected) return;

        if (typeof selected._closeSelection === "function") {
          selected._closeSelection();
          return;
        }

        const card = selected.closest(".art-card");
        selected.classList.remove("is-selected", "is-open");
        card?.classList.remove("is-title-visible", "is-expanded");
      }

      document.addEventListener("click", (event) => {
        const selected = document.querySelector(".art-image.is-selected");
        if (!selected) return;

        const stage = selected.closest(".art-stage");
        if (stage && stage.contains(event.target)) return;

        // Let other artworks handle switching selection themselves.
        if (event.target.closest(".art-image")) return;

        closeActiveArtwork();
      });

      artItems.forEach((item) => {
        const card = document.createElement("article");
        card.className = `art-card art-card-${item.type}`;

        const title = document.createElement("h3");
        title.className = "art-title";
        title.textContent = item.title;
        card.appendChild(title);

        if (item.type === "single") {
          const img = makeImage(item.src, item.title, "art-image", !!item.highres);
          const { stage } = makeStage(img, item.caption);

          img._closeSelection = () => {
            img.classList.remove("is-selected");
            card.classList.remove("is-title-visible");
          };

          img.addEventListener("click", () => {
            if (img.classList.contains("is-selected")) return;
            activateSelection({
              keepCard: card,
              keepCover: img,
              apply: () => {
                img.classList.add("is-selected");
                card.classList.add("is-title-visible");
              },
              scrollTarget: img,
            });
          });
          card.appendChild(stage);
        } else {
          const cover = makeImage(item.cover, `${item.title} cover`, "art-image", !!item.highres);
          cover.classList.add("art-cover");
          const hasAdditionalImages = Array.isArray(item.images) && item.images.length > 0;

          if (hasAdditionalImages && item.mode === "carousel") {
            card.classList.add("art-card-carousel");
            cover.classList.add("is-clickable");
            title.classList.add("is-clickable-title");

            const allSources = [item.cover, ...item.images];
            const allTitles = [
              item.title,
              ...(item.imageTitles || item.images.map(() => item.title)),
            ];
            const allCaptions = Array.isArray(item.captions)
              ? item.captions
              : allSources.map(() => item.caption || "Sample text.");
            let carouselIndex = 0;
            const frame = document.createElement("div");
            frame.className = "carousel-frame";
            const { stage, caption } = makeStage(frame, allCaptions[0]);

            function updateFrameMinHeight() {
              if (!cover.classList.contains("is-selected")) {
                frame.style.minHeight = "";
                return;
              }

              const width = cover.getBoundingClientRect().width;
              if (cover.naturalWidth > 0 && width > 0) {
                const height = width * (cover.naturalHeight / cover.naturalWidth);
                frame.style.minHeight = `${Math.ceil(height)}px`;
                return;
              }

              if (cover.offsetHeight > 0) {
                frame.style.minHeight = `${Math.ceil(cover.offsetHeight)}px`;
              }
            }

            // Warm the cache so cycling stays snappy.
            allSources.forEach((src) => {
              const preload = new Image();
              preload.src = encodeURI(toDisplayPath(src, !!item.highres));
            });

            function updateCarouselDisplay(options = {}) {
              const { scrollAfter = false, pinTop = false } = options;
              const isOpen = cover.classList.contains("is-selected");
              const topBefore = pinTop ? cover.getBoundingClientRect().top : null;

              if (isOpen) {
                // Hold current height through the swap so layout doesn't collapse mid-load.
                const currentHeight = cover.offsetHeight;
                if (currentHeight > 0) {
                  frame.style.minHeight = `${Math.ceil(currentHeight)}px`;
                }
              } else {
                frame.style.minHeight = "";
              }

              cover.src = encodeURI(toDisplayPath(allSources[carouselIndex], !!item.highres));
              cover.alt = allTitles[carouselIndex];
              title.textContent = allTitles[carouselIndex];
              caption.innerHTML = allCaptions[carouselIndex] || item.caption || "Sample text.";
              updateCarouselCursor();

              const finalizeLayout = () => {
                // Settle to this slide's height so shorter images don't keep leftover space.
                updateFrameMinHeight();
                if (cover.classList.contains("is-selected")) {
                  layoutCaptionPanel(stage);
                }

                if (pinTop && topBefore != null) {
                  // Keep the image top fixed while cycling — avoid smooth-scroll jitter.
                  const delta = cover.getBoundingClientRect().top - topBefore;
                  if (Math.abs(delta) > 0.5) {
                    window.scrollBy({ top: delta, behavior: "auto" });
                  }
                } else if (scrollAfter) {
                  scrollToArtwork(cover);
                }
              };

              if (cover.complete && cover.naturalWidth > 0) {
                requestAnimationFrame(finalizeLayout);
              } else {
                cover.addEventListener("load", finalizeLayout, { once: true });
              }
            }

            function updateCarouselCursor(event) {
              cover.classList.remove("is-carousel-prev", "is-carousel-next");

              if (!cover.classList.contains("is-selected")) {
                return;
              }

              if (!event) {
                cover.classList.add("is-carousel-next");
                return;
              }

              const rect = cover.getBoundingClientRect();
              const isLeftHalf = event.clientX - rect.left < rect.width / 2;

              if (isLeftHalf && carouselIndex > 0) {
                cover.classList.add("is-carousel-prev");
              } else {
                cover.classList.add("is-carousel-next");
              }
            }

            function advanceCarousel(direction) {
              if (direction === "prev" && carouselIndex > 0) {
                carouselIndex -= 1;
              } else {
                carouselIndex = (carouselIndex + 1) % allSources.length;
              }
              updateCarouselDisplay({ pinTop: true });
            }

            function resetCarousel() {
              carouselIndex = 0;
              frame.style.minHeight = "";
              updateCarouselDisplay();
            }

            cover._resetCarousel = resetCarousel;

            function openCarousel() {
              const switching = hasOpenSelection();
              carouselIndex = 0;
              if (switching) {
                clearSelections({ keepCard: card, keepCover: cover });
              }
              cover.classList.add("is-selected", "is-open");
              title.classList.add("is-open");
              card.classList.add("is-title-visible");
              if (!switching) {
                clearSelections({ keepCard: card, keepCover: cover });
              }
              layoutCaptionPanel(stage);
              requestAnimationFrame(() => layoutCaptionPanel(stage));
              updateCarouselDisplay({ scrollAfter: true });
            }

            function closeCarousel() {
              cover.classList.remove("is-selected", "is-open");
              title.classList.remove("is-open");
              card.classList.remove("is-title-visible");
              resetCarousel();
            }

            cover._closeSelection = closeCarousel;

            cover.addEventListener("click", (event) => {
              if (!cover.classList.contains("is-selected")) {
                openCarousel();
                return;
              }

              const rect = cover.getBoundingClientRect();
              const isLeftHalf = event.clientX - rect.left < rect.width / 2;

              if (isLeftHalf && carouselIndex > 0) {
                advanceCarousel("prev");
              } else {
                advanceCarousel("next");
              }
            });

            cover.addEventListener("mousemove", updateCarouselCursor);
            cover.addEventListener("mouseleave", () => {
              updateCarouselCursor();
            });

            title.addEventListener("click", (event) => {
              if (!cover.classList.contains("is-selected")) {
                event.stopPropagation();
                openCarousel();
              }
            });

            card.appendChild(stage);
            frame.appendChild(cover);
            updateFrameMinHeight();
            window.addEventListener("resize", updateFrameMinHeight);
          } else if (hasAdditionalImages) {
            cover.classList.add("is-clickable");
            title.classList.add("is-clickable-title");
            const more = document.createElement("div");
            more.className = "project-more";
            const { stage } = makeStage(cover, item.caption);

            function closeProject() {
              cover.classList.remove("is-selected", "is-open");
              title.classList.remove("is-open");
              card.classList.remove("is-title-visible", "is-expanded");
              card.querySelectorAll(".project-image-item.is-title-visible").forEach((wrap) => {
                wrap.classList.remove("is-title-visible");
              });
              card.querySelectorAll(".project-more .art-image.is-selected").forEach((img) => {
                img.classList.remove("is-selected");
              });
              title.textContent = item.title;
            }

            cover._closeSelection = closeProject;

            item.images.forEach((src, idx) => {
              const itemWrap = document.createElement("div");
              itemWrap.className = "project-image-item";

              const hasImageTitle = Array.isArray(item.imageTitles) && !!item.imageTitles[idx];

              const projectImg = makeImage(src, `${item.title} image ${idx + 2}`, "art-image", !!item.highres);
              projectImg.addEventListener("click", () => {
                if (projectImg.classList.contains("is-selected")) return;
                activateSelection({
                  keepCard: card,
                  keepCover: cover,
                  keepChild: projectImg,
                  apply: () => {
                    cover.classList.add("is-selected", "is-open");
                    title.classList.add("is-open");
                    card.classList.add("is-title-visible", "is-expanded");
                    projectImg.classList.add("is-selected");
                    if (hasImageTitle) {
                      title.textContent = item.imageTitles[idx];
                    }
                  },
                  scrollTarget: projectImg,
                });
              });
              itemWrap.appendChild(projectImg);
              more.appendChild(itemWrap);
            });

            const openProject = () => {
              if (cover.classList.contains("is-selected") || card.classList.contains("is-expanded")) {
                return;
              }
              activateSelection({
                keepCard: card,
                keepCover: cover,
                apply: () => {
                  cover.classList.add("is-selected", "is-open");
                  title.classList.add("is-open");
                  title.textContent = item.title;
                  card.classList.add("is-title-visible", "is-expanded");
                },
                scrollTarget: cover,
              });
            };

            cover.addEventListener("click", openProject);
            title.addEventListener("click", (event) => {
              if (
                cover.classList.contains("is-selected") ||
                card.classList.contains("is-expanded")
              ) {
                return;
              }
              event.stopPropagation();
              openProject();
            });

            card.appendChild(stage);
            card.appendChild(more);
          } else {
            const { stage } = makeStage(cover, item.caption);

            cover._closeSelection = () => {
              cover.classList.remove("is-selected");
              card.classList.remove("is-title-visible");
            };

            cover.addEventListener("click", () => {
              if (cover.classList.contains("is-selected")) return;
              activateSelection({
                keepCard: card,
                keepCover: cover,
                apply: () => {
                  cover.classList.add("is-selected");
                  card.classList.add("is-title-visible");
                },
                scrollTarget: cover,
              });
            });
            card.appendChild(stage);
          }
        }

        gallery.appendChild(card);
      });

      window.addEventListener("scroll", updateHeaderFade, { passive: true });
      window.addEventListener("resize", () => {
        updateHeaderFade();
        layoutActiveCaptionPanel();
      });
      updateHeaderFade();
    </script>
  </body>
</html>
